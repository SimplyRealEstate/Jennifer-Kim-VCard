<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jennifer Kim - Digital Business Card</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/jpe7fwd.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="logo.svg" class="simply-logo" alt="remax simply logo">
            
            <div class="profile">
                <img src="profile-img.png" alt="Jennifer's Profile Picture" class="profile-img">
            </div>
            <div class="profile-outline"></div>
        </div>
        <div class="header-line">
            <div class="header-line-slash"></div>
        </div>
        <div class="card-body">
            <div class="bio">
                <div class="realtor">Realtor</div>
                <div class="agent-name">Jennifer Kim</div>
            </div>
            <a class="contact" href="https://docs.google.com/uc?export=download&id=1AvSJdKbKLi5p62ieOLVFNXA2_uiG4XYv">Add Contact</a>
            <div class="call-email">
                <a href="tel:+12012909822" class="call">Call</a>
                <a href="mailto:hjkim6334@hotmail.com" class="email">Email</a>
            </div>
            <div class="info-box">
                " Simply Better "
                <br>
                <br>
                Office Address:
                <br>
                120 Sylvan Ave, Suite 106
                <br>
                Englewood Cliffs, NJ 07632
            </div>
            <div class="sns">
                <a href="https://jennifer-kim.remaxsimplynj.com/" target="_blank" class="sns-item">
                    <img src="web.svg" ></img>
                </a>
            </div>
        </div>        
        <div class="body-line">
        </div>
    </div>
</body>

</html>
